# SADT PoC — lab compose (bind loopback published ports)
services:
  api:
    build: ./backend
    environment:
      SADT_API_HOST: "0.0.0.0"
      # Override seed passwords for non-empty first boot:
      # SADT_SEED_ADMIN_PASSWORD: "change-me"
    volumes:
      - sadt-data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/auth/roles')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api

volumes:
  sadt-data:

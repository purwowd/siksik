[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
timeout = 300
markers =
    unit: unit tests tanpa I/O berat
    api: API / integration tests
    perf: benchmark performa (jalankan di server GPU)
    gpu: cek kesiapan GPU
    gpu_ocr: OCR nyata (PaddleOCR/EasyOCR) — mesin GPU
    gpu_whisper: Whisper ASR nyata — mesin GPU
    acceptance: gate deploy PoC
filterwarnings =
    ignore::DeprecationWarning
